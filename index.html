<title>GlowUp System</title>
<script>
// Inline manifest as blob for PWA
const manifest={name:"GlowUp System",short_name:"GlowUp",description:"Your complete skincare glow-up tracker",start_url:".",display:"standalone",background_color:"#09090e",theme_color:"#09090e",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2309090e'/%3E%3Ccircle cx='96' cy='96' r='60' fill='none' stroke='%23c8a84b' stroke-width='6'/%3E%3Ctext x='96' y='108' text-anchor='middle' font-size='52' fill='%23c8a84b'%3E✦%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"},{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%2309090e'/%3E%3Ccircle cx='256' cy='256' r='160' fill='none' stroke='%23c8a84b' stroke-width='14'/%3E%3Ctext x='256' y='286' text-anchor='middle' font-size='140' fill='%23c8a84b'%3E✦%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const link=document.createElement("link");
link.rel="manifest";link.href=url;
document.head.appendChild(link);
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#09090e;color:#ede8df;font-family:'Trebuchet MS',sans-serif;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{display:none;}
button{font-family:inherit;outline:none;-webkit-appearance:none;}
textarea{font-family:inherit;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 1.5s infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ── THEME ──────────────────────────────────────────────────────────────────
const C={
  bg:"#09090e",bg2:"#0f0e14",card:"#131219",cardBorder:"#1c1a24",
  gold:"#c8a84b",goldLight:"#e8c96a",goldDim:"rgba(200,168,75,0.1)",goldBorder:"rgba(200,168,75,0.25)",
  purple:"#9b7fca",purpleDim:"rgba(155,127,202,0.1)",purpleBorder:"rgba(155,127,202,0.25)",
  green:"#5daa80",greenDim:"rgba(93,170,128,0.1)",greenBorder:"rgba(93,170,128,0.25)",
  red:"#c05858",redDim:"rgba(192,88,88,0.1)",
  blue:"#5b8fc9",blueDim:"rgba(91,143,201,0.1)",
  text:"#ede8df",textMid:"#9a9080",textDim:"#52504a",white:"#f5f0e8",
};

// ── DATA ───────────────────────────────────────────────────────────────────
const SCHEDULE=[
  {day:"MON",type:"adaferin"},{day:"TUE",type:"aziderm"},{day:"WED",type:"recovery"},
  {day:"THU",type:"adaferin"},{day:"FRI",type:"recovery"},{day:"SAT",type:"aziderm"},{day:"SUN",type:"recovery"},
];
const MORNING_STEPS=[
  {icon:"💧",label:"CLEANSE",product:"Cetaphil Oily Skin Cleanser",price:"₹399",note:"20–30 sec massage, cold rinse",wait:null},
  {icon:"🍋",label:"VITAMIN C",product:"Minimalist Vit C 16%",price:"₹695",note:"3–4 drops, press in gently",wait:600},
  {icon:"🫧",label:"MOISTURISE",product:"Dot & Key Cica + Niacinamide",price:"₹545",note:"Thin even layer",wait:60},
  {icon:"☀️",label:"SPF — NEVER SKIP",product:"Minimalist SPF 50 PA++++",price:"₹475",note:"Generous — always last step",wait:null},
];
const ADAFERIN_STEPS=[
  {icon:"💧",label:"CLEANSE",product:"Cetaphil Oily Skin Cleanser",price:"₹399",note:"Cleanse, rinse, fully dry skin",wait:600},
  {icon:"⭐",label:"ADAFERIN",product:"Adaferin 0.1% Gel",price:"₹280",note:"Pea-sized — DRY SKIN ONLY",wait:600},
  {icon:"🌿",label:"MOISTURISE",product:"Dot & Key Cica + Niacinamide",price:"₹545",note:"Generous — Adaferin is drying",wait:null},
];
const AZIDERM_STEPS=[
  {icon:"💧",label:"CLEANSE",product:"Cetaphil Oily Skin Cleanser",price:"₹399",note:"Cleanse, wait 5 mins",wait:300},
  {icon:"🎯",label:"ALPHA ARBUTIN",product:"Minimalist Alpha Arbutin 2%",price:"₹445",note:"3–4 drops — from Week 4 only",wait:300},
  {icon:"✨",label:"AZIDERM",product:"Aziderm 10% Gel",price:"₹320",note:"Thin layer on marks + acne areas",wait:600},
  {icon:"🌿",label:"MOISTURISE",product:"Dot & Key Cica + Niacinamide",price:"₹545",note:"Seal everything in",wait:null},
];
const RECOVERY_STEPS=[
  {icon:"💧",label:"CLEANSE",product:"Cetaphil Oily Skin Cleanser",price:"₹399",note:"Gentle only — no pressure",wait:null},
  {icon:"🌿",label:"MOISTURISE",product:"Dot & Key + WOW Aloe Vera",price:"₹199",note:"Aloe first, Dot & Key on top",wait:null},
];
const SHOPPING=[
  {p:1,c:C.red,product:"Light Fluid SPF 50 PA++++",brand:"Minimalist",price:"₹475",where:"Nykaa"},
  {p:2,c:C.red,product:"Oily Skin Cleanser",brand:"Cetaphil",price:"₹399",where:"Pharmacy"},
  {p:3,c:C.red,product:"Adaferin 0.1% Gel",brand:"Adaferin",price:"₹280",where:"Medical pharmacy"},
  {p:4,c:C.red,product:"Cica + Niacinamide Moisturiser",brand:"Dot & Key",price:"₹545",where:"Nykaa"},
  {p:5,c:C.gold,product:"Vitamin C 16% EAA",brand:"Minimalist",price:"₹695",where:"Nykaa"},
  {p:6,c:C.gold,product:"Aziderm 10% Gel",brand:"Aziderm",price:"₹320",where:"Medical pharmacy"},
  {p:7,c:C.purple,product:"Alpha Arbutin 2%",brand:"Minimalist",price:"₹445",where:"Nykaa"},
  {p:8,c:C.purple,product:"99% Aloe Vera Gel",brand:"WOW",price:"₹199",where:"Nykaa"},
];
const SUPPLEMENTS=[
  {time:"AM",name:"Moringa ×1",brand:"Himalaya / Organic India",why:"Zinc + Vit A + amino acids"},
  {time:"AM",name:"Chia Seeds 1 tbsp",brand:"Raw / Truefarm",why:"Omega 3 → reduces inflammation"},
  {time:"AM",name:"7 Walnuts",brand:"Any raw",why:"Omega 3 + Vit E → scar healing"},
  {time:"PM",name:"Moringa ×1",brand:"Himalaya / Organic India",why:"Maintains Zinc levels"},
  {time:"PM",name:"Sea Buckthorn ×1",brand:"Himalaya / Herbal Hills",why:"Omega 7 → barrier repair"},
  {time:"PM",name:"Flaxseed Oil ×1",brand:"Himalaya (₹300)",why:"ALA Omega 3 → skin regeneration"},
];
const CLINIC=[
  {e:"🔴",name:"Subcision",why:"Breaks tissue pulling skin into pits",timing:"Do first",cost:"₹2k–4k"},
  {e:"🔴",name:"Microneedling ×6–8",why:"Collagen into depressed scars",timing:"After subcision",cost:"₹1.5k–3k/session"},
  {e:"🟠",name:"TCA Cross",why:"Individual deep boxcar scars",timing:"With microneedling",cost:"₹2k–3.5k"},
  {e:"🟡",name:"Chemical Peel TCA",why:"Texture + PIH together",timing:"Mid-routine",cost:"₹1.5k–3k"},
  {e:"🟢",name:"CO2 Fractional Laser",why:"Most powerful — remaining scars",timing:"Final stage",cost:"₹4k–8k"},
];
const PHASES=[
  {id:1,weeks:"Weeks 1–4",title:"Adjustment",desc:"Skin adapts to Adaferin. Possible purge — normal. Stay consistent.",color:C.gold},
  {id:2,weeks:"Weeks 5–8",title:"Building",desc:"Add Alpha Arbutin. Increase to 3 Adaferin nights/week if tolerating well.",color:C.purple},
  {id:3,weeks:"Month 3+",title:"Transform",desc:"Book dermat for microneedling. Marks fading. Texture improving.",color:C.green},
];
const MOTIVATIONS=[
  "Every step done is compounding. Your skin 3 months from now depends on today.",
  "The purge is proof it's working. Don't quit when it gets harder.",
  "SPF today = preventing tomorrow's pigmentation. Never skip it.",
  "Consistency beats perfection. A 70% routine daily beats 100% once a week.",
  "Your supplements are working inside while actives work outside.",
  "Results take 8 weeks minimum. Trust the process.",
  "Cut dairy. It's the one change that'll show fastest.",
  "Drink your water. Your actives are useless without hydration.",
  "You're doing what 90% of people never do — actually following a real plan.",
  "Book that dermat appointment. Skincare fixes the surface; they fix the depth.",
];

// ── UTILS ──────────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().split("T")[0];
const getDayIndex=()=>{const d=new Date().getDay();return d===0?6:d-1;};
const getTodaySched=()=>SCHEDULE[getDayIndex()];
const getDaySteps=t=>t==="adaferin"?ADAFERIN_STEPS:t==="aziderm"?AZIDERM_STEPS:RECOVERY_STEPS;
const typeColor=t=>t==="adaferin"?C.gold:t==="aziderm"?C.purple:C.green;
const typeLabel=t=>t==="adaferin"?"Adaferin Night":t==="aziderm"?"Aziderm Night":"Recovery Night";
const fmtDate=d=>new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short"});
const daysBetween=(d1,d2)=>Math.floor((new Date(d2)-new Date(d1))/86400000);

function calcStreak(h){
  let s=0,d=new Date(todayKey());
  for(let i=0;i<365;i++){
    const k=d.toISOString().split("T")[0];
    const e=h[k];
    if(e&&(e.morningDone||e.nightDone)){s++;d.setDate(d.getDate()-1);}
    else if(k===todayKey()){d.setDate(d.getDate()-1);}
    else break;
  }
  return s;
}
function calcTotal(h){return Object.values(h).filter(e=>e.morningDone||e.nightDone).length;}
function getStart(h){const k=Object.keys(h).sort();return k.length>0?k[0]:todayKey();}

// ── STORAGE (localStorage) ─────────────────────────────────────────────────
const load=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── SMALL COMPONENTS ───────────────────────────────────────────────────────
function Tag({children,color=C.gold}){
  return <span style={{fontSize:"9px",letterSpacing:"1.5px",fontWeight:"700",color,background:`${color}15`,border:`1px solid ${color}35`,borderRadius:"4px",padding:"2px 7px",fontFamily:"monospace"}}>{children}</span>;
}
function Pill({children,active,color,onClick}){
  return <button onClick={onClick} style={{background:active?`${color}18`:C.card,border:`1px solid ${active?color+"50":C.cardBorder}`,borderRadius:"20px",padding:"7px 14px",color:active?color:C.textDim,fontSize:"11px",cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.2s",flexShrink:0}}>{children}</button>;
}
function PBar({value,max,color=C.gold,h=3}){
  return <div style={{height:h,background:C.cardBorder,borderRadius:"99px",overflow:"hidden"}}><div style={{width:`${Math.min(100,(value/max)*100)}%`,height:"100%",background:color,borderRadius:"99px",transition:"width 0.4s ease"}}/></div>;
}
function StatBox({label,value,color=C.gold,sub}){
  return <div style={{background:C.card,border:`1px solid ${C.cardBorder}`,borderRadius:"14px",padding:"14px",textAlign:"center"}}>
    <div style={{fontSize:"26px",color,fontFamily:"Georgia,serif",lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:"10px",color:C.textDim,marginTop:"2px"}}>{sub}</div>}
    <div style={{fontSize:"10px",color:C.textDim,letterSpacing:"1.5px",marginTop:"4px"}}>{label}</div>
  </div>;
}

// ── WAIT TIMER ─────────────────────────────────────────────────────────────
function WaitTimer({totalSecs,color}){
  const[secs,setSecs]=useState(totalSecs);
  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const[expanded,setExpanded]=useState(false);
  const intervalRef=useRef(null);

  useEffect(()=>{
    if(running&&secs>0){
      intervalRef.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(intervalRef.current);setRunning(false);setDone(true);return 0;}return s-1;}),1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[running]);

  const reset=e=>{e&&e.stopPropagation();clearInterval(intervalRef.current);setSecs(totalSecs);setRunning(false);setDone(false);};
  const toggle=e=>{e.stopPropagation();if(done){reset(e);return;}if(!expanded)setExpanded(true);setRunning(r=>!r);};

  const mins=Math.floor(secs/60),rem=secs%60;
  const pct=(totalSecs-secs)/totalSecs;
  const r=22,cx=28,cy=28,circ=2*Math.PI*r;
  const label=`${Math.floor(totalSecs/60)} min`;

  return(
    <div style={{margin:"4px 0 6px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
        <div style={{height:"1px",flex:1,background:`${color}20`}}/>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <span style={{fontSize:"10px",color,letterSpacing:"0.8px",opacity:0.8}}>{done?"✓ done":`wait ${label}`}</span>
          <button onClick={toggle} style={{background:done?`${C.green}18`:running?`${color}20`:`${color}12`,border:`1px solid ${done?C.green+"40":color+"35"}`,borderRadius:"20px",padding:"3px 10px",color:done?C.green:color,fontSize:"10px",cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.2s"}}>
            {done?"↺ reset":running?"⏸ pause":"▶ start"}
          </button>
          {(running||(expanded&&!done&&secs<totalSecs))&&<button onClick={reset} style={{background:"transparent",border:"none",color:C.textDim,fontSize:"10px",cursor:"pointer",padding:"2px 4px"}}>✕</button>}
        </div>
        <div style={{height:"1px",flex:1,background:`${color}20`}}/>
      </div>
      {(running||(expanded&&secs<totalSecs&&!done))&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"16px",padding:"10px 0 4px",animation:"fadeIn 0.2s ease"}}>
          <svg width="56" height="56" style={{flexShrink:0}}>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={`${color}15`} strokeWidth="3"/>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke={done?C.green:color} strokeWidth="3" strokeLinecap="round"
              strokeDasharray={`${circ*pct} ${circ}`} strokeDashoffset="0" transform={`rotate(-90 ${cx} ${cy})`}
              style={{transition:"stroke-dasharray 0.5s linear"}}/>
            <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
              style={{fill:done?C.green:color,fontSize:"10px",fontFamily:"Trebuchet MS",fontWeight:"600"}}>
              {`${mins}:${String(rem).padStart(2,"0")}`}
            </text>
          </svg>
          <div>
            <div style={{fontSize:"22px",color:done?C.green:color,fontFamily:"Georgia,serif",lineHeight:1}}>{`${mins}:${String(rem).padStart(2,"0")}`}</div>
            <div style={{fontSize:"10px",color:C.textDim,marginTop:"3px"}}>{done?"proceed to next step":running?`of ${label}`:"paused"}</div>
          </div>
        </div>
      )}
      {done&&<div style={{textAlign:"center",fontSize:"11px",color:C.green,padding:"4px 0",letterSpacing:"1px"}}>✓ wait complete — proceed ↓</div>}
    </div>
  );
}

// ── STEP CARD ──────────────────────────────────────────────────────────────
function StepCard({step,checked,onToggle,color=C.gold}){
  return(
    <div style={{marginBottom:"4px"}}>
      <div onClick={onToggle} style={{background:checked?`${color}08`:C.card,border:`1px solid ${checked?color+"28":C.cardBorder}`,borderRadius:"13px",padding:"12px 14px",display:"flex",gap:"10px",alignItems:"flex-start",cursor:"pointer",transition:"all 0.2s",opacity:checked?0.55:1}}>
        <div style={{width:"30px",height:"30px",borderRadius:"50%",flexShrink:0,background:checked?`${color}20`:`${color}10`,border:`1px solid ${color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:checked?"14px":"15px",color:checked?color:"unset"}}>{checked?"✓":step.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
            <Tag color={color}>{step.label}</Tag>
            <span style={{fontSize:"11px",color:C.gold}}>{step.price}</span>
          </div>
          <div style={{fontSize:"13px",color:C.white,marginBottom:"1px"}}>{step.product}</div>
          <div style={{fontSize:"11px",color:C.textDim,fontStyle:"italic",marginTop:"3px"}}>{step.note}</div>
        </div>
      </div>
      {step.wait&&<WaitTimer totalSecs={step.wait} color={color}/>}
    </div>
  );
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function TodayScreen({history,setHistory,water,setWater}){
  const sched=getTodaySched();
  const nc=typeColor(sched.type),nl=typeLabel(sched.type),ns=getDaySteps(sched.type);
  const td=history[todayKey()]||{};
  const[mC,setMC]=useState(td.mChecked||{});
  const[nC,setNC]=useState(td.nChecked||{});
  const[note,setNote]=useState(td.note||"");
  const[showNote,setShowNote]=useState(false);
  const[saved,setSaved]=useState(false);

  const mDone=Object.values(mC).filter(Boolean).length;
  const nDone=Object.values(nC).filter(Boolean).length;
  const streak=calcStreak(history),total=calcTotal(history);
  const start=getStart(history),dayNum=daysBetween(start,todayKey())+1;
  const motiv=MOTIVATIONS[new Date().getDate()%MOTIVATIONS.length];
  const wTarget=8;

  const persist=useCallback(async(mc,nc,nt)=>{
    const e={mChecked:mc,nChecked:nc,note:nt,morningDone:Object.values(mc).filter(Boolean).length===MORNING_STEPS.length,nightDone:Object.values(nc).filter(Boolean).length===ns.length,date:todayKey(),type:sched.type};
    const up={...history,[todayKey()]:e};
    setHistory(up);save("history",up);
  },[history,ns.length,sched.type]);

  const tM=async i=>{const mc={...mC,[i]:!mC[i]};setMC(mc);await persist(mc,nC,note);};
  const tN=async i=>{const nc={...nC,[i]:!nC[i]};setNC(nc);await persist(mC,nc,note);};
  const saveNote=async()=>{await persist(mC,nC,note);setSaved(true);setTimeout(()=>setSaved(false),1500);};
  const addWater=()=>{const w=Math.min(water+1,12);setWater(w);save("water_"+todayKey(),w);};

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"18px"}}>
        <StatBox label="STREAK" value={`${streak}🔥`} color={C.gold} sub="days"/>
        <StatBox label="DAY" value={dayNum} color={C.purple} sub="of journey"/>
        <StatBox label="TOTAL" value={total} color={C.green} sub="done"/>
      </div>

      <div style={{background:C.goldDim,border:`1px solid ${C.goldBorder}`,borderRadius:"13px",padding:"12px 14px",marginBottom:"18px"}}>
        <div style={{fontSize:"9px",color:C.gold,letterSpacing:"2px",marginBottom:"5px"}}>TODAY'S REMINDER</div>
        <div style={{fontSize:"12px",color:C.textMid,lineHeight:"1.6",fontStyle:"italic"}}>"{motiv}"</div>
      </div>

      <div style={{display:"flex",gap:"4px",marginBottom:"18px"}}>
        {SCHEDULE.map((s,i)=>{
          const isT=i===getDayIndex(),c=typeColor(s.type);
          return <div key={i} style={{flex:1,borderRadius:"10px",padding:"7px 0",background:isT?`${c}20`:C.card,border:`1px solid ${isT?c+"50":C.cardBorder}`,textAlign:"center"}}>
            <div style={{fontSize:"8px",color:isT?c:C.textDim}}>{s.day}</div>
            <div style={{fontSize:"11px",marginTop:"2px",color:isT?c:C.textDim}}>{s.type==="adaferin"?"A":s.type==="aziderm"?"Z":"R"}</div>
          </div>;
        })}
      </div>

      {/* Water */}
      <div style={{background:C.card,border:`1px solid ${C.cardBorder}`,borderRadius:"14px",padding:"13px 14px",marginBottom:"18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <div>
            <div style={{fontSize:"10px",color:C.blue,letterSpacing:"2px",marginBottom:"2px"}}>💧 WATER TODAY</div>
            <div style={{fontSize:"12px",color:C.textDim}}>{water}/{wTarget} glasses · target 3.5L</div>
          </div>
          <button onClick={addWater} style={{background:C.blueDim,border:`1px solid ${C.blue}40`,borderRadius:"50%",width:"36px",height:"36px",color:C.blue,fontSize:"20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
        <div style={{display:"flex",gap:"4px",marginBottom:"6px"}}>
          {Array.from({length:wTarget}).map((_,i)=><div key={i} style={{flex:1,height:"8px",borderRadius:"4px",background:i<water?C.blue:C.cardBorder,transition:"background 0.3s"}}/>)}
        </div>
        {water>=wTarget&&<div style={{fontSize:"10px",color:C.blue,textAlign:"center",letterSpacing:"1px"}}>✓ TARGET MET</div>}
      </div>

      {/* Morning */}
      <div style={{marginBottom:"22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div style={{fontSize:"11px",letterSpacing:"2px",color:C.gold}}>☀️ MORNING {mDone===MORNING_STEPS.length&&"✓"}</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"11px",color:C.textDim}}>{mDone}/{MORNING_STEPS.length}</span>
            <div style={{width:"60px"}}><PBar value={mDone} max={MORNING_STEPS.length}/></div>
          </div>
        </div>
        {MORNING_STEPS.map((s,i)=><StepCard key={i} step={s} color={C.gold} checked={!!mC[i]} onToggle={()=>tM(i)}/>)}
      </div>

      {/* Night */}
      <div style={{marginBottom:"18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>

function TrackerScreen({history}){

  const entries=Object.values(history).sort((a,b)=>b.date.localeCompare(a.date));
  const start=getStart(history),daysSince=daysBetween(start,todayKey());
  const phase=daysSince<28?1:daysSince<56?2:3;
  const mPct=entries.length>0?Math.round(entries.filter(e=>e.morningDone).length/entries.length*100):0;
  const nPct=entries.length>0?Math.round(entries.filter(e=>e.nightDone).length/entries.length*100):0;
  const adaDone=entries.filter(e=>e.type==="adaferin"&&e.nightDone).length;

  const calDays=[];
  for(let i=34;i>=0;i--){

// ── INSTALL PROMPT ─────────────────────────────────────────────────────────
function InstallBanner(){
  const[show,setShow]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);
  const[installed,setInstalled]=useState(false);
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setDeferredPrompt(e);setShow(true);};
    window.addEventListener("beforeinstallprompt",handler);
    window.addEventListener("appinstalled",()=>{setShow(false);setInstalled(true);});
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);
  const install=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==="accepted"){setShow(false);}};
  if(!show||installed)return null;
  return(
    <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:`linear-gradient(135deg,${C.goldDim},rgba(155,127,202,0.1))`,borderBottom:`1px solid ${C.goldBorder}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:200}}>
      <div>
        <div style={{fontSize:"11px",color:C.gold,fontWeight:"700"}}>✦ Add to Home Screen</div>
        <div style={{fontSize:"10px",color:C.textDim}}>Install app for offline access</div>
      </div>
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={install} style={{background:C.gold,border:"none",borderRadius:"8px",padding:"6px 14px",color:C.bg,fontSize:"11px",cursor:"pointer",fontWeight:"700"}}>Install</button>
        <button onClick={()=>setShow(false)} style={{background:"transparent",border:"none",color:C.textDim,fontSize:"16px",cursor:"pointer"}}>✕</button>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
const NAV=[{id:"today",icon:"◎",l:"Today"},{id:"tracker",icon:"◈",l:"Tracker"},{id:"routine",icon:"✦",l:"Routine"},{id:"shop",icon:"◉",l:"Shop"},{id:"health",icon:"✚",l:"Health"}];

function App(){
  const[nav,setNav]=useState("today");
  const[history,setHistory]=useState({});
  const[bought,setBought]=useState({});
  const[water,setWater]=useState(0);
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    const h=load("history"),b=load("bought"),w=load("water_"+todayKey());
    if(h)setHistory(h);if(b)setBought(b);if(w!==null)setWater(w);
    setLoaded(true);
  },[]);

  const sched=getTodaySched();
  const titles={today:"Today",tracker:"Progress",routine:"Routines",shop:"Shopping",health:"Health"};

  if(!loaded)return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.gold,fontSize:"13px",letterSpacing:"3px"}}>LOADING...</div></div>;

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:"480px",margin:"0 auto",position:"relative"}}>
      <InstallBanner/>
      {/* Header */}
      <div style={{padding:"16px 18px 13px",background:`linear-gradient(180deg,#130f1e 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.cardBorder}`,position:"sticky",top:0,zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"8px",letterSpacing:"3px",color:C.gold,marginBottom:"1px"}}>GLOW-UP SYSTEM</div>
          <div style={{fontSize:"18px",color:C.white,fontFamily:"Georgia,serif"}}>{titles[nav]}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"10px",color:C.textDim}}>{new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</div>
          <div style={{display:"flex",gap:"4px",justifyContent:"flex-end",marginTop:"3px"}}>
            <Tag color={typeColor(sched.type)}>{typeLabel(sched.type).toUpperCase()}</Tag>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"16px 16px 96px",overflowY:"auto"}}>
        {nav==="today"&&<TodayScreen history={history} setHistory={setHistory} water={water} setWater={setWater}/>}
        {nav==="tracker"&&<TrackerScreen history={history}/>}
        {nav==="routine"&&<RoutineScreen/>}
        {nav==="shop"&&<ShopScreen bought={bought} setBought={setBought}/>}
        {nav==="health"&&<HealthScreen/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"rgba(9,9,14,0.97)",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.cardBorder}`,display:"flex",padding:"8px 0 max(12px,env(safe-area-inset-bottom))",zIndex:100}}>
        {NAV.map(item=>(
          <button key={item.id} onClick={()=>setNav(item.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"4px 0"}}>
            <div style={{fontSize:"15px",color:nav===item.id?C.gold:C.textDim,transition:"color 0.2s"}}>{item.icon}</div>
            <div style={{fontSize:"9px",letterSpacing:"0.8px",color:nav===item.id?C.gold:C.textDim,transition:"color 0.2s"}}>{item.l.toUpperCase()}</div>
            {nav===item.id&&<div style={{width:"4px",height:"4px",borderRadius:"50%",background:C.gold}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
